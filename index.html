<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💌 Uma correspondência especial</title>
  <style>
    /* Reset & Base Absoluta */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    body { background: radial-gradient(circle at center, #2a0815 0%, #0a0104 100%); height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: none; perspective: 1500px; color: #fff; }

    /* Partículas de Fundo */
    #particles { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .particle { position: absolute; background: rgba(255, 182, 193, 0.4); border-radius: 50%; box-shadow: 0 0 10px rgba(255, 182, 193, 0.6); animation: floatUp linear infinite; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* Container 3D e Cinematic Blur */
    #cinematic-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(0px); transition: backdrop-filter 1.5s ease; z-index: 5; pointer-events: none; }
    #cinematic-blur.active { backdrop-filter: blur(15px); background: rgba(0,0,0,0.4); pointer-events: all; }

    .scene { position: relative; z-index: 10; transform-style: preserve-3d; }

    /* O Envelope - Variáveis controladas via JS */
    :root { --rotX: 0deg; --rotY: 0deg; }
    .envelope-wrapper { width: 340px; height: 220px; position: relative; transform-style: preserve-3d; transform: rotateX(var(--rotX)) rotateY(var(--rotY)); transition: transform 0.1s linear; cursor: grab; }
    .envelope-wrapper.snap-back { transition: transform 0.8s cubic-bezier(0.25, 1.5, 0.5, 1); }

    /* Faces do Envelope */
    .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
    
    /* Frente */
    .face.front { background: linear-gradient(135deg, #fce4ec, #f8bbd0); display: flex; justify-content: center; align-items: center; z-index: 2; }
    
    /* Verso */
    .face.back { transform: rotateY(180deg); background: linear-gradient(135deg, #f8bbd0, #f48fb1); }

    /* Selo Premium */
    .seal { width: 60px; height: 60px; background: radial-gradient(circle, #e91e63, #880e4f); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; box-shadow: 0 0 20px rgba(233, 30, 99, 0.8), inset 0 0 10px rgba(255,255,255,0.4); animation: pulse 2s infinite; border: 2px solid #ff8a80; }
    @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(233, 30, 99, 0.8); } 50% { box-shadow: 0 0 40px rgba(233, 30, 99, 1); } 100% { box-shadow: 0 0 20px rgba(233, 30, 99, 0.8); } }

    /* Aba do Envelope (Flap) com textura */
    .flap { position: absolute; top: 0; left: 0; width: 0; height: 0; border-left: 170px solid transparent; border-right: 170px solid transparent; border-top: 120px solid #f06292; transform-origin: top; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4; border-radius: 12px 12px 0 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
    .open .flap { transform: rotateX(180deg); z-index: 1; }

    /* Carta em Glassmorphism */
    .letter { position: absolute; bottom: 10px; left: 15px; width: 310px; height: 200px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 30px 20px; transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 1.2s ease; z-index: 2; display: flex; flex-direction: column; align-items: center; overflow: hidden; opacity: 0.9; }
    .open .letter { transform: translateY(-200px) translateZ(50px) scale(1.1); height: 360px; z-index: 15; opacity: 1; box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(240, 98, 146, 0.4); }

    /* Textos da Carta */
    #message { font-size: 1.15rem; color: #333; text-align: left; line-height: 1.6; margin-top: 10px; min-height: 150px; width: 100%; font-weight: 500; text-shadow: 0 1px 1px rgba(255,255,255,0.8); }
    .cursor { display: inline-block; width: 2px; height: 1.2rem; background-color: #e91e63; vertical-align: middle; animation: blink 0.8s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Botão Neon */
    .btn { margin-top: auto; padding: 15px 40px; background: linear-gradient(45deg, #ff4081, #c51162); color: white; text-decoration: none; border-radius: 40px; font-weight: 800; font-size: 1.2rem; opacity: 0; transform: translateY(30px); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; box-shadow: 0 10px 20px rgba(197, 17, 98, 0.4); border: 2px solid #ff80ab; text-transform: uppercase; letter-spacing: 1px; }
    .btn.show { opacity: 1; transform: translateY(0); pointer-events: all; }
    .btn:active { transform: scale(0.92); box-shadow: 0 5px 10px rgba(197, 17, 98, 0.4); }

    /* Dica na tela */
    .hint { position: absolute; bottom: 50px; font-size: 1rem; color: rgba(255,255,255,0.7); text-align: center; width: 100%; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; transition: opacity 0.5s; z-index: 20; }

    /* Efeito de Explosão de Corações */
    .heart-burst { position: absolute; font-size: 1.5rem; pointer-events: none; opacity: 0; z-index: 20; }
    @keyframes burst {
      0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="particles"></div>
  <div id="cinematic-blur"></div>

  <div class="scene">
    <div class="envelope-wrapper snap-back" id="envelope">
      
      <div class="face front">
        <div class="seal">💌</div>
      </div>

      <div class="face back">
        <div class="flap" id="flap"></div>
        <div class="letter" id="letter">
          <div id="message"><span class="cursor"></span></div>
          
          <a href="https://wa.me/41999999999?text=Pode%20apostar%20que%20eu%20aceito...%20%F0%9F%98%88" class="btn" id="accept-btn">ACEITAR INTIMAÇÃO</a>
        </div>
        
        <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #880e4f; font-weight: bold; font-family: monospace; opacity: 0.6; z-index: 3;">
          <><br>const remetente = "[Miguel]";
        </div>
      </div>

    </div>
  </div>

  <div class="hint" id="hint-text">SEGURE E GIRE PARA INSPECIONAR</div>

  <audio id="paper-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
  <audio id="magic-sound" src="https://assets.mixkit.co/active_storage/sfx/2582/2582-preview.mp3" preload="auto"></audio>

  <script>
    // 1. Gerador de Partículas de Fundo
    const particlesContainer = document.getElementById('particles');
    for(let i=0; i<30; i++) {
      let p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = Math.random() * 6 + 2 + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = Math.random() * 5 + 5 + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      particlesContainer.appendChild(p);
    }

    const envelope = document.getElementById('envelope');
    const flap = document.getElementById('flap');
    const cinematicBlur = document.getElementById('cinematic-blur');
    const hint = document.getElementById('hint-text');
    const audioPaper = document.getElementById('paper-sound');
    const audioMagic = document.getElementById('magic-sound');
    
    let isDragging = false;
    let startX, startY;
    let currentRotX = 0, currentRotY = 0;
    let targetRotX = 0, targetRotY = 0;
    let isOpen = false;
    let hasInspected = false;

    // 2. Motor 3D Livre (Inspecionar)
    document.addEventListener('touchstart', (e) => {
      if(isOpen) return;
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      envelope.classList.remove('snap-back'); // Remove suavização para o dedo seguir perfeito
      
      if(!hasInspected) {
        hint.innerText = "DESLIZE A ABA DO ENVELOPE PARA CIMA";
        hasInspected = true;
      }
    }, {passive: true});

    document.addEventListener('touchmove', (e) => {
      if(!isDragging || isOpen) return;
      
      const deltaX = e.touches[0].clientX - startX;
      const deltaY = e.touches[0].clientY - startY;
      
      // Sensibilidade do giro
      targetRotY = currentRotY + (deltaX * 0.5);
      targetRotX = currentRotX - (deltaY * 0.5);

      // Limita o eixo X para não virar de ponta cabeça bizarramente
      targetRotX = Math.max(-60, Math.min(60, targetRotX));

      envelope.style.setProperty('--rotX', targetRotX + 'deg');
      envelope.style.setProperty('--rotY', targetRotY + 'deg');
    }, {passive: true});

    document.addEventListener('touchend', () => {
      if(!isDragging || isOpen) return;
      isDragging = false;
      currentRotX = targetRotX;
      currentRotY = targetRotY;

      // Magia: Quando solta, ele se auto-corrige suavemente para mostrar a parte de trás (onde abre)
      envelope.classList.add('snap-back');
      targetRotX = 0;
      targetRotY = 180; // Trava nas costas pra poder abrir
      currentRotX = 0;
      currentRotY = 180;
      
      envelope.style.setProperty('--rotX', '0deg');
      envelope.style.setProperty('--rotY', '180deg');
    });

    // 3. Sistema Cinematográfico de Abertura
    let flapStartY = 0;
    flap.addEventListener('touchstart', e => { flapStartY = e.touches[0].clientY; }, {passive: true});
    flap.addEventListener('touchmove', e => {
      if(isOpen || currentRotY !== 180) return; // Só abre se estiver olhando pras costas
      if(flapStartY - e.touches[0].clientY > 30) openLetter();
    }, {passive: true});

    function openLetter() {
      if(isOpen) return;
      isOpen = true;
      hint.style.opacity = 0;
      
      // Áudio
      audioPaper.volume = 0.6; audioPaper.play().catch(()=>{});
      setTimeout(() => { audioMagic.volume = 0.4; audioMagic.play().catch(()=>{}); }, 800);

      // Trava 3D
      envelope.style.setProperty('--rotX', '0deg');
      envelope.style.setProperty('--rotY', '180deg');

      // Inicia animações
      envelope.classList.add('open');
      cinematicBlur.classList.add('active');
      createExplosion();

      // Inicia terminal typing
      setTimeout(typeText, 2000);
    }

    // 4. Efeito Especial de Explosão (VFX)
    function createExplosion() {
      const rect = envelope.getBoundingClientRect();
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      for(let i = 0; i < 20; i++) {
        let heart = document.createElement('div');
        heart.innerHTML = ['💕', '✨', '💖'][Math.floor(Math.random()*3)];
        heart.className = 'heart-burst';
        heart.style.left = centerX + 'px';
        heart.style.top = centerY + 'px';
        
        // Matemágica pra jogar pra todos os lados pra cima
        const angle = (Math.random() * Math.PI) - (Math.PI / 2); // Cima e lados
        const distance = Math.random() * 200 + 100;
        const tx = Math.sin(angle) * distance + 'px';
        const ty = -Math.cos(angle) * distance + 'px'; // Negativo é pra cima
        const rot = Math.random() * 360 + 'deg';

        heart.style.setProperty('--tx', tx);
        heart.style.setProperty('--tx', tx);
        heart.style.setProperty('--ty', ty);
        heart.style.setProperty('--rot', rot);
        heart.style.animation = `burst 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
        
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1500);
      }
    }

    // 5. Máquina de Escrever Estilo Programador
    const msgElement = document.getElementById('message');
    const texto = "Console.log('Você disse que só faltava o convite ne?'); \n\nAgora nao tem desculpa... Com firma reconhecida em código: topa vir dormir comigo?";
    let index = 0;

    function typeText() {
      if(index === 0) msgElement.innerHTML = '<span class="cursor"></span>';
      
      if (index < texto.length) {
        let currentHTML = msgElement.innerHTML.replace('<span class="cursor"></span>', '');
        let char = texto.charAt(index);
        if(char === '\n') char = '<br>';
        
        msgElement.innerHTML = currentHTML + char + '<span class="cursor"></span>';
        index++;
        
        // Randomiza velocidade da digitação para parecer real
        let speed = Math.random() * 30 + 30;
        setTimeout(typeText, speed);
      } else {
        setTimeout(() => {
          document.getElementById('accept-btn').classList.add('show');
        }, 500);
      }
    }
  </script>
</body>
</html>
